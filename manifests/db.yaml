apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
spec:
  replicas: 1
  selector:
    matchLabels: { app: db }      # <-- selector matches the Pod label below
  template:
    metadata:
      labels: { app: db }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          envFrom:
            - configMapRef: { name: db-config }
            - secretRef: { name: db-secret }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: db                        # the app will reach the DB at host "db"
spec:
  selector: { app: db }
  ports: [{ port: 5432, targetPort: 5432 }]
